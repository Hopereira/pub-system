name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 20

jobs:
  # ============================================
  # JOB 1: Backend - Lint, Build, Test, Migrations
  # ============================================
  backend:
    name: Backend (lint + build + test + migrations)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: pub_system_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: testpass
      DB_DATABASE: pub_system_test
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      FRONTEND_URL: http://localhost:3001
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run typeorm:migration:run
        continue-on-error: false

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e -- --passWithNoTests
        continue-on-error: true

  # ============================================
  # JOB 2: Frontend - Lint, Build
  # ============================================
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  # ============================================
  # JOB 3: Security Audit
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend audit
        working-directory: backend
        run: npm audit --audit-level=critical || true
        
      - name: Frontend audit
        working-directory: frontend
        run: npm audit --audit-level=critical || true

  # ============================================
  # JOB 4: Deploy Staging (only on main push)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Backend to Oracle VM
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          SSH_HOST: ${{ secrets.ORACLE_HOST }}
          SSH_USER: ${{ secrets.ORACLE_USER }}
        run: |
          echo "🚀 Deploying backend to staging..."
          # Criar arquivo de chave SSH temporário
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # Adicionar host conhecido
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Deploy via SSH
          ssh -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /home/ubuntu/pub-system/backend
            git pull origin main
            npm ci --legacy-peer-deps
            npm run build
            npm run typeorm:migration:run
            pm2 restart pub-backend || pm2 start dist/main.js --name pub-backend
          ENDSSH
          
          # Limpar chave
          rm -f ~/.ssh/deploy_key
          echo "✅ Backend deployed successfully"
        continue-on-error: true

      - name: Verify deployment health
        run: |
          echo "🔍 Checking deployment health..."
          sleep 10
          curl -f https://api.pubsystem.com.br/health || echo "⚠️ Health check failed"
        continue-on-error: true

      - name: Rollback on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          SSH_HOST: ${{ secrets.ORACLE_HOST }}
          SSH_USER: ${{ secrets.ORACLE_USER }}
        run: |
          echo "🔄 Rolling back to previous version..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          ssh -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd /home/ubuntu/pub-system/backend
            git checkout HEAD~1
            npm run build
            pm2 restart pub-backend
          ENDSSH
          
          rm -f ~/.ssh/deploy_key
          echo "✅ Rollback completed"
