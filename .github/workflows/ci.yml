name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22

jobs:
  # ============================================
  # JOB 1: Backend - Lint, Build, Test, Migrations
  # ============================================
  backend:
    name: Backend (lint + build + test + migrations)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: pub_system_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: testpass
      DB_DATABASE: pub_system_test
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      FRONTEND_URL: http://localhost:3001
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      CI_ADMIN_EMAIL: admin@admin.com
      CI_ADMIN_PASSWORD: ${{ secrets.CI_ADMIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Sync schema (criar tabelas no banco vazio)
        run: npm run typeorm -- schema:sync

      - name: Run migrations
        run: npm run typeorm:migration:run
        continue-on-error: true

      - name: Unit tests
        run: npm test -- --passWithNoTests

      - name: E2E tests
        run: npm run test:e2e -- --passWithNoTests

  # ============================================
  # JOB 2: Frontend - Lint, Build
  # ============================================
  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_API_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  # ============================================
  # JOB 3: Security Audit
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Backend audit
        working-directory: backend
        run: npm audit --audit-level=critical || true
        
      - name: Frontend audit
        working-directory: frontend
        run: npm audit --audit-level=critical || true

  # ============================================
  # JOB 4: Deploy Staging (only on main push)
  # ============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [backend, frontend, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v5

      - name: Deploy Backend to Oracle VM
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          SSH_HOST: ${{ secrets.ORACLE_HOST }}
          SSH_USER: ${{ secrets.ORACLE_USER }}
        run: |
          echo "🚀 Deploying backend to staging..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null

          # Liberar espaço no servidor (SEM --volumes para não derrubar postgres)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=30 $SSH_USER@$SSH_HOST \
            "docker image prune -af 2>/dev/null || true; \
             docker builder prune -af 2>/dev/null || true; \
             find /var/lib/docker/containers -name '*.log' -exec truncate -s 0 {} \; 2>/dev/null || true; \
             df -h / || true"

          # Criar bundle git e enviar para o servidor
          git bundle create /tmp/repo.bundle HEAD main
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            /tmp/repo.bundle $SSH_USER@$SSH_HOST:/tmp/repo.bundle

          # Atualizar código via bundle
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "cd ~/pub-system && \
             git fetch /tmp/repo.bundle main:main 2>/dev/null || true && \
             git reset --hard main && \
             rm -f /tmp/repo.bundle && \
             echo '✅ Código atualizado'"

          # Iniciar build em background (evita Broken pipe no npm install longo)
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
            "cd ~/pub-system && \
             if docker compose version &>/dev/null 2>&1; then COMPOSE='docker compose'; else COMPOSE='docker-compose'; fi && \
             nohup bash -c \"\$COMPOSE -f docker-compose.micro.yml build backend >> /tmp/deploy-build.log 2>&1 && \
             \$COMPOSE -f docker-compose.micro.yml up -d --no-deps --force-recreate backend >> /tmp/deploy-build.log 2>&1 && \
             echo DEPLOY_OK >> /tmp/deploy-build.log || echo DEPLOY_FAIL >> /tmp/deploy-build.log\" &
             echo \$! > /tmp/deploy.pid && echo '🔨 Build iniciado em background'"

          # Aguardar conclusão (polling a cada 30s, max 15min)
          echo "⏳ Aguardando build..."
          for i in $(seq 1 30); do
            sleep 30
            RESULT=$(ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST \
              "tail -1 /tmp/deploy-build.log 2>/dev/null || echo PENDING")
            echo "[$i/30] Status: $RESULT"
            if echo "$RESULT" | grep -q "DEPLOY_OK"; then
              echo "✅ Deploy concluído com sucesso!"
              break
            fi
            if echo "$RESULT" | grep -q "DEPLOY_FAIL"; then
              echo "❌ Deploy falhou!"
              ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST "cat /tmp/deploy-build.log | tail -30"
              exit 1
            fi
          done

          rm -f ~/.ssh/deploy_key
          echo "✅ Backend deployed successfully"
        continue-on-error: false

      - name: Verify deployment health
        run: |
          echo "🔍 Checking deployment health..."
          sleep 15
          curl -f https://api.pubsystem.com.br/health
        continue-on-error: false

      - name: Rollback on failure
        if: failure()
        env:
          SSH_PRIVATE_KEY: ${{ secrets.ORACLE_SSH_KEY }}
          SSH_HOST: ${{ secrets.ORACLE_HOST }}
          SSH_USER: ${{ secrets.ORACLE_USER }}
        run: |
          echo "🔄 Rolling back to previous version..."
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          ssh -i ~/.ssh/deploy_key $SSH_USER@$SSH_HOST << 'ENDSSH'
            cd ~/pub-system
            bash scripts/rollback.sh --force
          ENDSSH
          
          rm -f ~/.ssh/deploy_key
          echo "✅ Rollback completed"
