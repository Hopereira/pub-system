# ============================================
# Docker Compose - Oracle E2.1.Micro (1GB RAM)
# ============================================
# Arquitetura:
# - Backend: Oracle E2.1.Micro (este arquivo)
# - Frontend: Vercel (deploy separado)
# - Database: PostgreSQL 17 local (Docker)
#
# Uso: docker compose -f docker-compose.micro.yml up -d

services:
  # ============================================
  # PostgreSQL 17 - Banco local
  # ============================================
  postgres:
    image: postgres:17-alpine
    container_name: pub-postgres
    networks:
      - pub-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pubuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-pubsystem}
    volumes:
      - infra_postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pubuser} -d ${POSTGRES_DB:-pubsystem}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================
  # Backend API (NestJS) - Otimizado para 512MB
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.micro
    container_name: pub-backend
    networks:
      - pub-network
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=384
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${POSTGRES_USER:-pubuser}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_DATABASE=${POSTGRES_DB:-pubsystem}
      - DB_SSL=false
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-credentials.json
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
      - CLOUDFLARE_ZONE_ID=${CLOUDFLARE_ZONE_ID:-}
      - CLOUDFLARE_BASE_DOMAIN=${CLOUDFLARE_BASE_DOMAIN:-pubsystem.com.br}
      - CLOUDFLARE_TARGET_IP=${CLOUDFLARE_TARGET_IP}
    env_file:
      - ./.env
    volumes:
      - ./gcs-credentials.json:/app/gcs-credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.8'
        reservations:
          memory: 256M
          cpus: '0.3'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================
  # Watchtower - Auto-update containers
  # ============================================
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    networks:
      - pub-network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'

volumes:
  infra_postgres_data:
    external: true

networks:
  pub-network:
    name: pub-network
    driver: bridge
