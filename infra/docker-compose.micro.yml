# ============================================
# Docker Compose - Oracle E2.1.Micro (1GB RAM)
# ============================================
# Arquitetura: Oracle E2.1.Micro (1GB RAM)
# - Backend: container pub-backend (este arquivo)
# - Frontend: Vercel (deploy separado)
# - Database: PostgreSQL 17 local (container pub-postgres)
#
# Uso: docker compose -f docker-compose.micro.yml up -d

services:
  # ============================================
  # Backend API (NestJS) - Otimizado para 512MB
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.micro
    container_name: pub-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=384
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - BACKEND_URL=${BACKEND_URL}
      - FRONTEND_URL=${FRONTEND_URL}
      # Google Cloud Storage (opcional)
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME:-}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-credentials.json
    env_file:
      - ./.env.micro
    volumes:
      - ./gcs-credentials.json:/app/gcs-credentials.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.8'
        reservations:
          memory: 256M
          cpus: '0.3'
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================
  # Watchtower - Auto-update containers
  # ============================================
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=86400
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.1'
