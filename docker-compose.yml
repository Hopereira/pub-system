services:
  # --- Serviço do Back-end (nossa API NestJS) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pub_system_backend
    ports:
      - "3000:3000" # <-- ATUALIZADO: Mudei para a porta 3333 para não conflitar com o front-end
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
    networks:
      - pub_network
    env_file:
      - ./.env
    command: npm run start:dev

  # --- Serviço do Banco de Dados PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: pub_system_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: '1gb'
    networks:
      - pub_network
    env_file:
      - ./.env

  # --- (Bônus) Serviço do PGAdmin ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: pub_system_pgadmin
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - pub_network
    env_file:
      - ./.env

  # --- (NOVO) Serviço do Front-end (nossa aplicação Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pub_system_frontend
    ports:
      - "3001:3000" # <-- O front-end agora usa a porta 3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pub_network
    # Linhas necessárias para o hot-reload do Next.js funcionar corretamente
    stdin_open: true
    tty: true

# --- Declaração das redes e volumes ---
networks:
  pub_network:
    driver: bridge

volumes:
  postgres_data: