services:
  # --- Serviço do Back-end (nossa API NestJS) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pub_system_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pub_network
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
    env_file:
      - ./.env
    command: npm run start:dev

  # --- Serviço do Banco de Dados PostgreSQL ---
  db:
    image: postgres:15-alpine
    container_name: pub_system_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    shm_size: '1gb'
    networks:
      - pub_network
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  # --- (Bônus) Serviço do PGAdmin ---
  pgadmin:
    image: dpage/pgadmin4
    container_name: pub_system_pgadmin
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - pub_network
    env_file:
      - ./.env

  # --- Serviço do Front-end (nossa aplicação Next.js) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pub_system_frontend
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - node_modules_frontend:/app/node_modules
    networks:
      - pub_network
    environment: # <-- BLOCO ADICIONADO
      - API_URL_SERVER=http://backend:3000
      - NEXT_PUBLIC_API_URL=http://localhost:3000
    stdin_open: true
    tty: true

# --- Declaração das redes e volumes ---
networks:
  pub_network:
    driver: bridge

volumes:
  postgres_data:
  node_modules_frontend: {}